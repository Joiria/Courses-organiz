<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="icon" href="./courses-logo-icon-brand-identity-sign-symbol-template-vector.jpg" type="image/png">
    <link rel="stylesheet" href="./bootstrarp/bootstrap.min.css">
    <link rel="stylesheet" href="./bootstrarp/style.css">
</head>

<body>
    <header>
               <nav class="navbar navbar-expand-lg navbar-dark bg-dark custom-navbar p-4">

            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="./index.html">Course Orgnaizar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarID">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarID">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link " href="./index.html">Home</a>
                        <a class="nav-link" href="./courses.html">My Courses</a>
                        <a class="nav-link active" href="./add-course.html">Add Courses</a>
                        <a class="nav-link " href="./contact.html">Contact Us</a>
                    </div>
                </div>

            </div>
        </nav>
    </header>
    <main class="container mt-5">
        <h2 class="mb-4">Add Course</h2>

        <form id="courseForm" class="bg-light p-4 rounded shadow">

            <div class="mb-3">
                <label class="form-label">Course Name</label>
                <input type="text" id="name" class="form-control" placeholder="Enter The Course Name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Instructor</label>
                <input type="text" id="instructor" class="form-control" placeholder="Enter The Instructor Name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Hours</label>
                <input type="number" id="hours" class="form-control" placeholder="Enter The hours" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Notes</label>
                <textarea id="notes" class="form-control" placeholder="Enter Your Notes"></textarea>
            </div>

            <button class="btn btn-primary w-100" type="submit">Add Course</button>
        </form>
    </main>

    <script>
        document.getElementById("courseForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let course = {
                name: document.getElementById("name").value,
                instructor: document.getElementById("instructor").value,
                hours: document.getElementById("hours").value,
                notes: document.getElementById("notes").value
            };

            let courses = JSON.parse(localStorage.getItem("courses")) || [];
            courses.push(course);
            localStorage.setItem("courses", JSON.stringify(courses));

            alert("Course Added Successfully");
            this.reset();
        });
    </script>

    <script src="./bootstrap.bundle.min.js"></script>
</body>

</html>
