<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses</title>
    <link rel="icon" href="./courses-logo-icon-brand-identity-sign-symbol-template-vector.jpg" type="image/png">
    <link rel="stylesheet" href="./bootstrarp/bootstrap.min.css">
    <link rel="stylesheet" href="./bootstrarp/style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark custom-navbar p-4">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="./index.html">Course Orgnaizar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarID">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarID">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link " href="./index.html">Home</a>
                        <a class="nav-link active" href="./courses.html">My Courses</a>
                        <a class="nav-link" href="./add-course.html">Add Courses</a>
                        <a class="nav-link" href="./contact.html">Contact Us</a>
                    </div>
                </div>

            </div>
        </nav>
    </header>
    <main class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-3 ">
            <h2 class="h1 bolder">My Courses</h2>
            <a href="add-course.html" class="btn btn-success"> Add Course</a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-striped shadow rounded overflow-hidden">
                <thead class="table-primary">
                    <tr>
                        <th>Name</th>
                        <th>Instructor</th>
                        <th>Hours</th>
                        <th>Notes</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody></tbody>
            </table>
        </div>
    </main>
    <script>let tbody = document.querySelector("tbody");

function getCourses() {
    return JSON.parse(localStorage.getItem("courses")) || [];
}

function displayCourses() {
    let courses = getCourses();
    tbody.innerHTML = "";

    courses.forEach((course, index) => {
        tbody.innerHTML += `
        <tr>
            <td>${course.name}</td>
            <td>${course.instructor}</td>
            <td>${course.hours}</td>
            <td>${course.notes}</td>
            <td class="text-center">
                <a href="edit-course.html?index=${index}" class="btn btn-warning btn-sm me-2 px-3">Edit</a>
                <button class="btn btn-danger btn-sm px-3" onclick="deleteCourse(${index})">Delete</button>
            </td>
        </tr>
        `;
    });
}

function deleteCourse(index) {
    if (confirm("Are you sure you want to delete this course?")) {
        let courses = getCourses();
        courses.splice(index, 1);
        localStorage.setItem("courses", JSON.stringify(courses));
        displayCourses();
    }
}

displayCourses();
</script>


    <footer class="bg-black  fw-bolder p-3 border-5 mt-5 text-center">
        <p class="text-light">© 2026 All Rights Reserved</p>
    </footer>


    <script src="./bootstrarp/bootstrap.bundle.min.js"></script>
</body>

</html>
